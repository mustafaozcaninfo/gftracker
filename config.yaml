base_url: "https://www.galerieslafayette.qa"
offer_path: "/offer.html"
offer_params:
  is_scroll: "1"

# Pagination: 0 = auto-detect from k-page-count (152 pages)
max_pages: 0

# false = all products on offer pages | true = only % Off badge items
discounted_only: false

output:
  db_path: "data/products_history.db"
  snapshot_dir: "data"

scraper:
  # stealth | normal | turbo  (turbo ≈ 2-4 min for 152 pages)
  speed: turbo
  min_delay: 0.1
  max_delay: 0.35
  min_rate_limit: 0.15
  max_rate_limit: 0.45
  max_retries: 2
  retry_backoff: 0.8
  timeout: 20
  use_playwright: false

proxies: []
# Example:
# proxies:
#   - "http://user:pass@proxy1.example.com:8080"
#   - "http://user:pass@proxy2.example.com:8080"

report:
  top_n: 20
