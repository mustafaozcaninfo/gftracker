name: Deploy Web

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "models.py"
      - "export_web.py"
      - "gender.py"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

concurrency:
  group: gftracker-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Prepare data directory
        run: mkdir -p data

      - name: Restore data cache
        uses: actions/cache/restore@v4
        with:
          path: data/
          key: gftracker-data-v2-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            gftracker-data-v2-${{ github.ref_name }}-
            gftracker-data-v2-

      - name: Export web JSON from cached database
        run: python export_web.py

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web deps
        working-directory: web
        run: npm ci

      - name: Unit tests
        working-directory: web
        run: npm test

      - name: Build web
        working-directory: web
        run: npm run build

      - name: Deploy to Vercel
        working-directory: web
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_AUAwIcLTdwVr02cvagUnwFh5
          VERCEL_PROJECT_ID: prj_feBvylpgLPqGJ3eLVQNA814168vp
        run: npx vercel deploy --prod --yes --token "$VERCEL_TOKEN" --scope mst4fa-6141s-projects
