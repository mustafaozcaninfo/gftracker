name: Deploy Web

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

concurrency:
  group: gftracker-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web deps
        working-directory: web
        run: npm ci

      - name: Unit tests
        working-directory: web
        run: npm test

      - name: Build web
        working-directory: web
        run: npm run build

      - name: Deploy to Vercel
        working-directory: web
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_AUAwIcLTdwVr02cvagUnwFh5
          VERCEL_PROJECT_ID: prj_feBvylpgLPqGJ3eLVQNA814168vp
        run: npx vercel deploy --prod --yes --token "$VERCEL_TOKEN" --scope mst4fa-6141s-projects
