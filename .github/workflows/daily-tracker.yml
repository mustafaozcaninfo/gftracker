name: Hourly GF Tracker

on:
  schedule:
    # Every hour on the hour (UTC)
    - cron: "0 * * * *"
  workflow_dispatch:

concurrency:
  group: gftracker-scrape-${{ github.ref }}
  cancel-in-progress: false

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Prepare data directory
        run: mkdir -p data

      - name: Restore data cache
        uses: actions/cache/restore@v4
        with:
          path: data/
          key: gftracker-data-v2-${{ github.ref_name }}
          restore-keys: |
            gftracker-data-v2-${{ github.ref_name }}-
            gftracker-data-v2-

      - name: Hourly scrape + export
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python daily_tracker.py

      - name: Save data cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/
          key: gftracker-data-v2-${{ github.ref_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web deps
        working-directory: web
        run: npm ci

      - name: Build web
        working-directory: web
        run: npm run build

      - name: Deploy to Vercel
        working-directory: web
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_AUAwIcLTdwVr02cvagUnwFh5
          VERCEL_PROJECT_ID: prj_feBvylpgLPqGJ3eLVQNA814168vp
        run: npx vercel deploy --prod --yes --token "$VERCEL_TOKEN" --scope mst4fa-6141s-projects
